modLoader = "javafml"
loaderVersion = "[4,)"
license = "MIT"
issueTrackerURL = "https://github.com/oliveryasuna/minecraft-mods/issues"

[[mods]]
modId = "${mod_id}"
version = "${mod_version}"
displayName = "${mod_name}"
description = '''${mod_desc}'''
logoFile = "assets/rubric/icon.png"
authors = "${mod_author}"
displayURL = "https://github.com/oliveryasuna/minecraft-mods"

[[dependencies.${ mod_id }]]
modId = "neoforge"
type = "required"
versionRange = "[${neoforge_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "minecraft"
type = "required"
versionRange = "[${minecraft_version},)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${ mod_id }]]
modId = "yet_another_config_lib_v3"
type = "optional"
versionRange = "[3.7.0,)"
ordering = "NONE"
side = "CLIENT"

[[dependencies.${ mod_id }]]
modId = "cloth_config"
type = "optional"
versionRange = "[19.0,)"
ordering = "NONE"
side = "CLIENT"
