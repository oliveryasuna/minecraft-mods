name: CodeQL

on:
  push:
  pull_request:
  # Weekly rescan even on quiet weeks — CodeQL rules update independently of
  # our code, so a passing scan today isn't a passing scan tomorrow.
  schedule:
    - cron: '30 3 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  analyze:
    name: Analyze (java-kotlin)
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.4.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4.36.3
        with:
          languages: java-kotlin
          build-mode: manual

      # See ci.yml for the pre-build rationale — Loom reads these mod jars at
      # configuration time (coal-fabric, and the coal-yacl-adapter-fabric that
      # the ssd mod uses for its dev runtime). Built in order in separate
      # invocations: the adapter's own configuration reads coal-fabric.jar.
      - name: Pre-build COAL runtime jars
        run: |
          ./gradlew :libraries:coal:coal-fabric:remapJar --configure-on-demand --stacktrace
          ./gradlew :libraries:coal:coal-yacl-adapter-fabric:remapJar --configure-on-demand --stacktrace

      # --rerun-tasks + --no-build-cache force fresh compilation so CodeQL's
      # build tracer intercepts every javac invocation. Without this, the
      # gradle/actions/setup-gradle cache serves compile outputs and the tracer
      # sees no source — CodeQL then errors with "detected code written in
      # Java/Kotlin but this run didn't build any of it".
      - name: Assemble
        run: ./gradlew assemble --rerun-tasks --no-build-cache --stacktrace

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4.36.3
        with:
          category: "/language:java-kotlin"
