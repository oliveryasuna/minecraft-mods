name: Nightly (refresh deps)

on:
  # 06:00 UTC daily — off-peak, catches upstream drift (Fabric API / YACL /
  # Cloth / NeoForge snapshots) before it lands in our feature-branch CI.
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

concurrency:
  group: nightly
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.loader }}) with refreshed deps
    runs-on: ubuntu-24.04
    timeout-minutes: 90
    strategy:
      fail-fast: false
      matrix:
        include:
          - loader: fabric
            assemble-task: assembleFabric
            check-task: checkFabric
          - loader: neoforge
            assemble-task: assembleNeoForge
            check-task: checkNeoForge
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      # See ci.yml for the pre-build rationale.
      - name: Pre-build coal-fabric.jar
        run: ./gradlew :libraries:coal:coal-fabric:remapJar --configure-on-demand --refresh-dependencies --stacktrace

      - name: Assemble
        run: ./gradlew ${{ matrix.assemble-task }} --refresh-dependencies --stacktrace

      - name: Check
        run: ./gradlew ${{ matrix.check-task }} --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-reports-${{ matrix.loader }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
          retention-days: 14
