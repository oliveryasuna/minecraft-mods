name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Lint (spotless)
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      # Pre-build coal-fabric.jar. The Fabric adapter projects declare
      # modLocalRuntime(projects.libraries.coal.coalFabric), which Loom reads
      # at configuration time. On a fresh CI checkout no jar exists, so ANY
      # task that configures those projects (including spotlessCheck) fails.
      # Explicit task path + --configure-on-demand keeps the adapter projects
      # from being configured during the pre-build itself.
      - name: Pre-build coal-fabric.jar
        run: ./gradlew :libraries:coal:coal-fabric:remapJar --configure-on-demand --stacktrace

      - name: Spotless check
        run: ./gradlew spotlessCheck --stacktrace

  build:
    name: Build (${{ matrix.loader }})
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - loader: fabric
            assemble-task: assembleFabric
            check-task: checkFabric
          - loader: neoforge
            assemble-task: assembleNeoForge
            check-task: checkNeoForge
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 21
        uses: actions/setup-java@v5.5.0
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6.2.0

      # Pre-build coal-fabric.jar. The Fabric adapter projects declare
      # modLocalRuntime(projects.libraries.coal.coalFabric), which Loom reads
      # at configuration time. On a fresh CI checkout no jar exists, so ANY
      # task that configures those projects (including tasks in the NG job)
      # fails. Explicit task path + --configure-on-demand keeps the adapter
      # projects from being configured during the pre-build itself.
      - name: Pre-build coal-fabric.jar
        run: ./gradlew :libraries:coal:coal-fabric:remapJar --configure-on-demand --stacktrace

      - name: Assemble
        run: ./gradlew ${{ matrix.assemble-task }} --stacktrace

      - name: Check
        run: ./gradlew ${{ matrix.check-task }} --stacktrace

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: test-reports-${{ matrix.loader }}
          path: |
            **/build/reports/tests/
            **/build/test-results/
          if-no-files-found: ignore
          retention-days: 7
