name: Dependency review

on:
  pull_request:

permissions:
  contents: read

jobs:
  review:
    name: Dependency review
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v7.0.0

      - name: Review dependencies
        uses: actions/dependency-review-action@v5.0.0
